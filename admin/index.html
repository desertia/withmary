<!DOCTYPE html>
<html lang="ko">
<head>
    <!-- MARK: 기본 설정 -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>With Mary Admin</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">
    <!-- MARK: 로그인 화면 -->
    <main class="login-container">
        <header class="logo-area">
            <img class="logo" src="../assets/brand/logo.png" alt="With Mary">
            <p class="admin-title">ADMIN CONSOLE</p>
        </header>

        <section class="login-card" aria-labelledby="loginHeading">
            <h1 id="loginHeading" class="sr-only">관리자 로그인</h1>

            <div class="input-group">
                <label for="email">Email</label>
                <input id="email" name="email" type="email" placeholder="admin@withmary.app" autocomplete="email" inputmode="email">
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input id="password" name="password" type="password" placeholder="••••••••" autocomplete="current-password">
            </div>

            <p id="loginError" class="login-error" role="alert" aria-live="polite"></p>

            <button id="loginButton" class="primary-button" type="button">로그인</button>
        </section>

        <footer class="login-footer">With Mary Administration · © 2026 With Mary</footer>
    </main>

    <!-- MARK: Firebase 인증 모듈 -->
    <script type="module" src="js/auth.js"></script>
</body>
</html>
