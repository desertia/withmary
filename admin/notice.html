<!DOCTYPE html>
<html lang="ko">
<head>
    <!-- MARK: 기본 설정 -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="documentTitle">새 공지 작성 | With Mary Admin</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="admin-page">
    <!-- MARK: 인증 확인 중 화면 -->
    <div id="pageLoading" class="page-loading" role="status">관리자 권한을 확인하고 있습니다...</div>

    <!-- MARK: 관리자 화면 -->
    <div id="adminContent" class="admin-shell" hidden>
        <header class="admin-header">
            <div class="admin-brand">
                <img src="../assets/brand/logo.png" alt="With Mary">
                <span>Admin</span>
            </div>

            <div class="admin-account">
                <span id="adminEmail"></span>
                <button id="logoutButton" class="secondary-button" type="button">로그아웃</button>
            </div>
        </header>

        <main class="admin-main notice-editor-main">
            <div class="page-heading">
                <div>
                    <p class="eyebrow">WITH MARY ADMIN</p>
                    <h1 id="pageTitle">새 공지 작성</h1>
                    <p id="pageDescription">앱과 웹사이트에 표시할 공지를 작성합니다.</p>
                </div>
            </div>

            <section class="notice-form-section" aria-labelledby="noticeFormHeading">
                <div class="notice-section-heading">
                    <div>
                        <h2 id="noticeFormHeading">공지 내용</h2>
                        <p>필수 항목을 입력한 뒤 저장해 주세요.</p>
                    </div>
                </div>

                <form id="noticeForm" class="notice-form">
                    <div class="form-field">
                        <label for="title">제목</label>
                        <input id="title" name="title" type="text" maxlength="200" placeholder="공지 제목을 입력해 주세요." required>
                    </div>

                    <div class="form-field">
                        <label for="body">내용</label>
                        <textarea id="body" name="body" rows="10" placeholder="공지 내용을 입력해 주세요." required></textarea>
                    </div>

                    <fieldset class="form-field form-fieldset">
                        <legend>대상</legend>
                        <p class="field-description">하나 이상 선택해 주세요.</p>
                        <div class="option-group">
                            <label class="check-option" for="targetApp">
                                <input id="targetApp" name="targets" type="checkbox" value="App">
                                <span>App</span>
                            </label>
                            <label class="check-option" for="targetWeb">
                                <input id="targetWeb" name="targets" type="checkbox" value="Web">
                                <span>Web</span>
                            </label>
                        </div>
                    </fieldset>

                    <div class="form-field enabled-field">
                        <div>
                            <label for="isEnabled">사용 여부</label>
                            <p class="field-description">켜면 저장 후 공지가 게시 대상으로 설정됩니다.</p>
                        </div>
                        <label class="switch" for="isEnabled">
                            <input id="isEnabled" name="isEnabled" type="checkbox" checked>
                            <span class="switch-track" aria-hidden="true"></span>
                            <span class="sr-only">공지 사용</span>
                        </label>
                    </div>

                    <p id="formError" class="form-error" role="alert" aria-live="polite"></p>

                    <div class="form-actions">
                        <button id="cancelButton" class="secondary-button action-button" type="button">취소</button>
                        <button id="saveButton" class="primary-button action-button" type="submit">저장</button>
                    </div>
                </form>
            </section>
        </main>
    </div>

    <!-- MARK: 공지 작성 및 관리자 인증 모듈 -->
    <script type="module" src="js/notice.js"></script>
</body>
</html>
